{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=\, initial-scale=1.0">
    <title>Parkease</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex">

<!-- Sidebar -->
<div class="sidebar bg-dark text-white p-3">

<h4 class="text-center mb-4">ParkEase</h4>

<ul class="nav flex-column">

<li class="nav-item">
<a class="nav-link text-white" href="{% url 'admin_dashboard' %}">Dashboard</a>
</li>
<li class="nav-item">
<a class="nav-link text-white" href="reports.html">Reports</a>
</li>

<li class="nav-item">
<a class="nav-link text-danger" href="{% url 'logout' %}">Logout</a>
</li>

</ul>

</div>
<div class="main-content p-4">
<h3 class="mb-3">Welcome Admin {{request.user.username}}</h3>
<h2 class="mb-4">Dashboard</h2>

<div class="row g-4">

<div class="col-md-4">
<div class="card shadow-sm">
<div class="card-body">
<h5>Total Vehicles Today</h5>
<h2>{{total_vehicles}}</h2>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card shadow-sm">
<div class="card-body">
<h5>Vehicles Currently Parked</h5>
<h2>{{parked_vehicles}}</h2>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card shadow-sm">
<div class="card-body">
<h5>Signed out Vehicles</h5>
<h2>{{signed_out_vehicles}}</h2>
</div>
</div>
</div>

</div>
</div>
</div>
</body>
</html>
